<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepoLearn - Grammar Master</title>
    <link rel="icon" type="image" href="asset/Logo.png"/>
    
    <!-- นำเข้า Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- นำเข้า React และ ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- นำเข้า Babel สำหรับแปลง JSX ให้เบราว์เซอร์อ่านเข้าใจ -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar {
          width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background-color: #dcfce7;
          border-radius: 10px;
        }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb {
          background-color: #86efac;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ไอคอนต่างๆ (แปลงจาก Lucide Icons เป็น SVG ธรรมดาเพื่อให้อ่านได้ในไฟล์เดียว) ---
        const IconBookOpen = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const IconCheckCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        );
        const IconInfo = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        );
        const IconBookMarked = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="2" width="16" height="20" rx="2" ry="2" />
                <line x1="4" y1="18" x2="20" y2="18" />
                <path d="M9 2v9l3-2 3 2V2" />
            </svg>
        );
        const IconExternalLink = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        );
        const IconMenu = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        );
        const IconX = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        );
        const IconGlobe = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        );


        // --- ภาพประกอบ Vector (SVG) สำหรับแต่ละคำบุพบท ---
        const Cat = ({ x, y, className }) => (
            <g transform={`translate(${x}, ${y})`} className={className}>
                {/* หู */}
                <polygon points="5,-5 0,-15 15,-5" fill="#f97316" />
                <polygon points="35,-5 40,-15 25,-5" fill="#f97316" />
                {/* หัว/ตัว */}
                <circle cx="20" cy="15" r="20" fill="#fb923c" />
                {/* ตา */}
                <circle cx="12" cy="10" r="3" fill="#1e293b" />
                <circle cx="28" cy="10" r="3" fill="#1e293b" />
                {/* จมูก/ปาก */}
                <polygon points="18,15 22,15 20,18" fill="#f43f5e" />
                <path d="M 20 18 Q 15 22 10 18" stroke="#1e293b" fill="none" strokeWidth="1.5" />
                <path d="M 20 18 Q 25 22 30 18" stroke="#1e293b" fill="none" strokeWidth="1.5" />
            </g>
        );

        const Box = ({ x, y, width = 60, height = 60, className, transparent = false }) => (
            <g transform={`translate(${x}, ${y})`} className={className}>
                <rect x="0" y="0" width={width} height={height} rx="4" fill={transparent ? "rgba(212, 170, 112, 0.4)" : "#d4aa70"} stroke="#b48648" strokeWidth="2" />
                <path d={`M 0 15 L ${width} 15`} stroke="#b48648" strokeWidth="2" />
            </g>
        );

        const Tree = ({ x, y }) => (
            <g transform={`translate(${x}, ${y})`}>
                <rect x="15" y="30" width="10" height="30" fill="#78350f" />
                <circle cx="20" cy="15" r="25" fill="#22c55e" />
            </g>
        );

        const IllusIn = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <Box x="20" y="30" width="60" height="60" />
                <Cat x="30" y="20" />
                <path d="M 20 45 L 80 45 L 80 90 L 20 90 Z" fill="#d4aa70" opacity="0.9" />
                <path d="M 20 45 L 80 45" stroke="#b48648" strokeWidth="2" />
            </svg>
        );

        const IllusOn = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <Box x="20" y="50" width="60" height="40" />
                <Cat x="30" y="10" />
            </svg>
        );

        const IllusAt = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <path d="M 10 80 L 90 80" stroke="#94a3b8" strokeWidth="4" />
                <rect x="60" y="30" width="30" height="50" fill="#94a3b8" rx="4" />
                <text x="75" y="55" fontSize="12" textAnchor="middle" fill="white">BUS</text>
                <Cat x="15" y="45" />
                <path d="M 35 35 C 35 25 45 25 45 35 C 45 45 35 55 35 55 C 35 55 25 45 25 35 Z" fill="#ef4444" />
                <circle cx="35" cy="35" r="4" fill="white" />
            </svg>
        );

        const IllusUnder = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <rect x="10" y="30" width="80" height="10" fill="#8b5cf6" rx="2" />
                <rect x="20" y="40" width="8" height="50" fill="#7c3aed" />
                <rect x="72" y="40" width="8" height="50" fill="#7c3aed" />
                <Cat x="30" y="55" />
            </svg>
        );

        const IllusNextTo = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <Box x="10" y="40" width="40" height="50" />
                <Cat x="55" y="55" />
            </svg>
        );

        const IllusBetween = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <Box x="5" y="40" width="30" height="40" />
                <Box x="65" y="40" width="30" height="40" />
                <Cat x="30" y="45" />
            </svg>
        );

        const IllusBelow = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <rect x="25" y="10" width="50" height="30" fill="#38bdf8" stroke="#0284c7" strokeWidth="4" rx="2" />
                <Cat x="30" y="60" />
                <line x1="50" y1="45" x2="50" y2="55" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="4" />
            </svg>
        );

        const IllusOpposite = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <path d="M 40 10 L 60 10 L 60 90 L 40 90 Z" fill="#64748b" />
                <line x1="50" y1="10" x2="50" y2="90" stroke="white" strokeWidth="2" strokeDasharray="5" />
                <Cat x="0" y="35" />
                <Tree x="65" y="25" />
            </svg>
        );

        const IllusNear = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <Box x="10" y="20" width="30" height="30" />
                <Cat x="60" y="60" />
                <path d="M 45 45 Q 55 50 60 60" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="4" fill="none" />
            </svg>
        );

        const IllusAbove = () => (
            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-md">
                <Box x="20" y="60" width="60" height="30" />
                <Cat x="30" y="10" />
                <line x1="50" y1="50" x2="50" y2="55" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="4" />
            </svg>
        );

        // --- ข้อมูลเนื้อหา ---
        const prepositionsData = [
            {
                id: 1, word: "In", phonetic: "/ɪn/", translation: { th: "ใน, ภายใน", en: "In, Inside" },
                illustration: IllusIn,
                description: { 
                    th: "ใช้บอกตำแหน่งที่สิ่งหนึ่งอยู่ 'ภายใน' พื้นที่, ภาชนะ, หรือสิ่งห่อหุ้มบางอย่างที่มีขอบเขตชัดเจน",
                    en: "Used to indicate that something is 'inside' a space, container, or boundary."
                },
                keyRule: {
                    th: "นึกถึงสิ่งของที่ถูกล้อมรอบด้วย 3 มิติ (มีขอบเขต ซ้าย ขวา หน้า หลัง บน ล่าง)",
                    en: "Think of a 3D enclosed space (surrounded on all sides)."
                },
                examples: [
                    { en: "The cat is in the box.", th: "แมวอยู่ในกล่อง" },
                    { en: "I live in Bangkok.", th: "ฉันอาศัยอยู่ในกรุงเทพฯ (เมือง/ประเทศ ถือเป็นพื้นที่ใหญ่ ใช้ in)" },
                    { en: "The keys are in my pocket.", th: "กุญแจอยู่ในกระเป๋ากางเกงของฉัน" }
                ]
            },
            {
                id: 2, word: "On", phonetic: "/ɒn/", translation: { th: "บน", en: "On" },
                illustration: IllusOn,
                description: {
                    th: "ใช้บอกตำแหน่งที่สิ่งหนึ่งอยู่ 'บนพื้นผิว' ของอีกสิ่งหนึ่ง โดยมีการสัมผัสกับพื้นผิวนั้น",
                    en: "Used to indicate that something is positioned 'on the surface' of another object, touching it."
                },
                keyRule: {
                    th: "ต้องมีการสัมผัส (Touching) ผิวหน้าของสิ่งนั้น ไม่ว่าจะแนวราบหรือแนวดิ่ง",
                    en: "There must be physical contact (touching) with a surface, either horizontal or vertical."
                },
                examples: [
                    { en: "The cat is on the table.", th: "แมวอยู่บนโต๊ะ" },
                    { en: "There is a picture on the wall.", th: "มีรูปภาพติดอยู่บนผนัง (พื้นผิวแนวดิ่ง)" },
                    { en: "The book is on the desk.", th: "หนังสืออยู่บนโต๊ะทำงาน" }
                ]
            },
            {
                id: 3, word: "At", phonetic: "/æt/", translation: { th: "ที่", en: "At" },
                illustration: IllusAt,
                description: {
                    th: "ใช้บอก 'จุดตำแหน่งเฉพาะ' (Specific point) หรือสถานที่ใดสถานที่หนึ่งในแผนที่ ไม่ได้เน้นว่าอยู่ข้างในหรือข้างบน",
                    en: "Used to indicate a 'specific point' or location on a map, not emphasizing inside or on top."
                },
                keyRule: {
                    th: "นึกถึงการปักหมุด (Pin) บนแผนที่ หรือสถานที่ที่เราไปเพื่อทำกิจกรรมเฉพาะจุดนั้น",
                    en: "Think of pinning a location on a map or a place for a specific activity."
                },
                examples: [
                    { en: "I am waiting at the bus stop.", th: "ฉันกำลังรออยู่ที่ป้ายรถเมล์ (จุดปักหมุด)" },
                    { en: "She is at school.", th: "เธออยู่ที่โรงเรียน (สถานที่ทำกิจกรรม)" },
                    { en: "Look at the door.", th: "มองไปที่ประตูสิ" }
                ]
            },
            {
                id: 4, word: "Under", phonetic: "/ˈʌn.dər/", translation: { th: "ใต้, ข้างใต้", en: "Under" },
                illustration: IllusUnder,
                description: {
                    th: "ใช้บอกตำแหน่งที่สิ่งหนึ่งอยู่ 'ต่ำกว่า' และมักจะถูกอีกสิ่งหนึ่ง 'ปกคลุม' หรือ 'บัง' อยู่เบื้องบนตรงๆ",
                    en: "Used to indicate something is 'lower than' and usually 'covered' by something else directly above it."
                },
                keyRule: {
                    th: "อยู่ต่ำกว่าแบบมีสิ่งของบางอย่างครอบ หรือบังอยู่ด้านบนโดยตรง",
                    en: "Lower position with something directly covering or blocking from above."
                },
                examples: [
                    { en: "The cat is sleeping under the table.", th: "แมวกำลังนอนอยู่ใต้โต๊ะ" },
                    { en: "I found my shoes under the bed.", th: "ฉันเจอร้องเท้าอยู่ใต้เตียง" },
                    { en: "He hid the letter under a book.", th: "เขาซ่อนจดหมายไว้ใต้หนังสือ" }
                ]
            },
            {
                id: 5, word: "Next to", phonetic: "/nekst tuː/", translation: { th: "ถัดจาก, ข้างๆ", en: "Next to, Beside" },
                illustration: IllusNextTo,
                description: {
                    th: "ใช้บอกว่าสิ่งหนึ่งตั้งอยู่ 'ด้านข้าง' ของอีกสิ่งหนึ่ง โดยปกติจะอยู่ติดกันหรือชิดกันมาก",
                    en: "Used to indicate something is situated at the 'side' of another object, usually very close or touching."
                },
                keyRule: {
                    th: "มีความหมายเหมือนกับคำว่า Beside (ข้างๆ) แต่ Next to นิยมใช้มากกว่าในภาษาพูด",
                    en: "Similar to 'Beside', but 'Next to' is more common in spoken language."
                },
                examples: [
                    { en: "The bank is next to the hospital.", th: "ธนาคารอยู่ถัดจากโรงพยาบาล" },
                    { en: "Come and sit next to me.", th: "มานั่งข้างๆ ฉันสิ" },
                    { en: "The cat is sitting next to the box.", th: "แมวนั่งอยู่ข้างๆ กล่อง" }
                ]
            },
            {
                id: 6, word: "Between", phonetic: "/bɪˈtwiːn/", translation: { th: "ระหว่าง", en: "Between" },
                illustration: IllusBetween,
                description: {
                    th: "ใช้บอกตำแหน่งที่สิ่งหนึ่งอยู่ 'ตรงกลาง' โดยมีสิ่งอื่นขนาบอยู่ 2 ข้าง (หรืออยู่ท่ามกลางสิ่งของที่นับได้เป็นชิ้นๆ)",
                    en: "Used to indicate something is 'in the middle' of two other things flanking it."
                },
                keyRule: {
                    th: "มักจะตามด้วย [A and B] หรือคำนามพหูพจน์ 2 สิ่ง",
                    en: "Usually followed by [A and B] or plural nouns representing two items."
                },
                examples: [
                    { en: "The cat is between the two boxes.", th: "แมวอยู่ระหว่างกล่องสองใบ" },
                    { en: "The shop is between the bank and the school.", th: "ร้านค้าอยู่ระหว่างธนาคารและโรงเรียน" },
                    { en: "She sat between John and Mary.", th: "เธอนั่งอยู่ระหว่างจอห์นและแมรี่" }
                ]
            },
            {
                id: 7, word: "Below", phonetic: "/bɪˈləʊ/", translation: { th: "ต่ำกว่า, ข้างล่าง", en: "Below" },
                illustration: IllusBelow,
                description: {
                    th: "ใช้บอกว่าสิ่งหนึ่งอยู่ 'ในระดับที่ต่ำกว่า' อีกสิ่งหนึ่ง โดยไม่จำเป็นต้องอยู่ข้างใต้ตรงๆ และมักไม่ได้ถูกปกคลุม",
                    en: "Used to indicate something is at a 'lower level' than another, not necessarily directly underneath or covered."
                },
                keyRule: {
                    th: "เน้น 'ระดับความสูง' ที่ต่ำกว่า (ใช้ตรงข้ามกับ Above) เช่น ระดับอุณหภูมิ, ตำแหน่งในหน้ากระดาษ",
                    en: "Emphasizes 'lower height level' (opposite of Above), e.g., temperature, position on a page."
                },
                examples: [
                    { en: "Please read the text below the picture.", th: "โปรดอ่านข้อความที่อยู่ต่ำกว่า(ด้านล่าง)รูปภาพ" },
                    { en: "The temperature is below zero.", th: "อุณหภูมิต่ำกว่าศูนย์องศา" },
                    { en: "Her apartment is below mine.", th: "อพาร์ตเมนต์ของเธออยู่ชั้นต่ำกว่าของฉัน" }
                ]
            },
            {
                id: 8, word: "Opposite", phonetic: "/ˈɒp.ə.zɪt/", translation: { th: "ตรงข้าม", en: "Opposite" },
                illustration: IllusOpposite,
                description: {
                    th: "ใช้บอกว่าสิ่งหนึ่งอยู่ 'ฝั่งตรงข้าม' กับอีกสิ่งหนึ่ง โดยมักจะมีพื้นที่ว่าง ถนน หรือทางเดินคั่นกลางและหันหน้าเข้าหากัน",
                    en: "Used to indicate something is on the 'other side' of another thing, usually facing each other with space in between."
                },
                keyRule: {
                    th: "ต้องอยู่คนละฝั่งและหันหน้าเผชิญกัน",
                    en: "Must be on different sides and facing each other."
                },
                examples: [
                    { en: "The cat is opposite the tree.", th: "แมวอยู่ฝั่งตรงข้ามกับต้นไม้" },
                    { en: "My house is opposite the park.", th: "บ้านของฉันอยู่ตรงข้ามสวนสาธารณะ" },
                    { en: "He sat opposite me at the table.", th: "เขานั่งตรงข้ามกับฉันที่โต๊ะ" }
                ]
            },
            {
                id: 9, word: "Near", phonetic: "/nɪər/", translation: { th: "ใกล้", en: "Near" },
                illustration: IllusNear,
                description: {
                    th: "ใช้บอกระยะทางว่า 'อยู่ไม่ไกล' หรือ 'ใกล้เคียง' (แต่ไม่ได้แปลว่าติดกันแบบ Next to)",
                    en: "Used to indicate a short distance, 'not far' or 'close' (but not necessarily touching like Next to)."
                },
                keyRule: {
                    th: "ใช้บอกระยะห่างกว้างๆ ว่าอยู่ในบริเวณใกล้เคียง",
                    en: "Indicates general proximity in the surrounding area."
                },
                examples: [
                    { en: "Is there a hospital near here?", th: "มีโรงพยาบาลอยู่แถวนี้(ใกล้ๆ นี้)ไหม?" },
                    { en: "The cat is near the box.", th: "แมวอยู่ใกล้กล่อง" },
                    { en: "I don't live near the sea.", th: "ฉันไม่ได้อาศัยอยู่ใกล้ทะเล" }
                ]
            },
            {
                id: 10, word: "Above", phonetic: "/əˈbʌv/", translation: { th: "เหนือ, ข้างบน", en: "Above" },
                illustration: IllusAbove,
                description: {
                    th: "ใช้บอกว่าสิ่งหนึ่งอยู่ 'ในระดับที่สูงกว่า' อีกสิ่งหนึ่ง โดย 'ไม่ได้สัมผัส' กัน",
                    en: "Used to indicate something is at a 'higher level' than another thing, 'without touching'."
                },
                keyRule: {
                    th: "เน้น 'ระดับความสูง' ที่สูงกว่า (ใช้ตรงข้ามกับ Below) ไม่มีการสัมผัสผิวหน้าเหมือน On",
                    en: "Emphasizes 'higher height level' (opposite of Below) without surface contact like 'On'."
                },
                examples: [
                    { en: "The bird is flying above the tree.", th: "นกกำลังบินอยู่เหนือต้นไม้" },
                    { en: "There is a mirror above the sink.", th: "มีกระจกอยู่เหนืออ่างล้างหน้า" },
                    { en: "The clouds are above us.", th: "ก้อนเมฆอยู่เหนือพวกเรา" }
                ]
            }
        ];

        // ดิกชันนารีสำหรับข้อความ UI ทั่วไป
        const uiTexts = {
            th: {
                appName: "PrepoLearn",
                appSub: "Grammar Master",
                prepositionsTitle: "คำบุพบท (Prepositions)",
                positionPlace: "Position / Place",
                means: "แปลว่า:",
                description: "คำอธิบาย (Description)",
                trick: "💡 ทริคในการจำ:",
                examples: "ตัวอย่างประโยค (Examples)",
                footerText: "ออกแบบและพัฒนาสำหรับการเรียนรู้ภาษาอังกฤษ (English Grammar Prepositions of Place)",
                refText: "อ้างอิง: Cambridge Dictionary, Oxford Learner's",
                langToggle: "EN"
            },
            en: {
                appName: "PrepoLearn",
                appSub: "Grammar Master",
                prepositionsTitle: "Prepositions",
                positionPlace: "Position / Place",
                means: "Means:",
                description: "Description",
                trick: "💡 Tip to remember:",
                examples: "Examples",
                footerText: "Designed and developed for English learning (English Grammar Prepositions of Place)",
                refText: "References: Cambridge Dictionary, Oxford Learner's",
                langToggle: "TH"
            }
        };

        function App() {
            const [activeId, setActiveId] = useState(1);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [language, setLanguage] = useState('en');

            const activeData = prepositionsData.find(item => item.id === activeId);
            const IllustrationComponent = activeData.illustration;
            const t = uiTexts[language];

            const toggleLanguage = () => {
                setLanguage(prev => prev === 'th' ? 'en' : 'th');
            };

            return (
                <div className="min-h-screen bg-[#fdfbf7] text-gray-800 font-sans p-2 sm:p-6 lg:p-8 flex items-center justify-center">
                    <div className="w-full max-w-6xl bg-white rounded-[2rem] sm:rounded-[3rem] shadow-2xl shadow-green-900/5 flex flex-col md:flex-row overflow-hidden border-4 border-[#e8f5e9] min-h-[85vh] relative">
                        
                        {/* Mobile Menu Toggle */}
                        <button 
                            className="md:hidden absolute top-4 left-4 z-50 p-2 bg-green-50 rounded-full text-green-700"
                            onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                        >
                            {isMobileMenuOpen ? <IconX size={24} /> : <IconMenu size={24} />}
                        </button>

                        {/* --- Sidebar Navigation --- */}
                        <aside className={`${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 transition-transform duration-300 absolute md:relative z-40 h-full w-64 bg-[#f8fcf9] border-r-2 border-[#dcfce7] flex flex-col pt-16 md:pt-8`}>
                            <div className="px-8 pb-6 flex items-center gap-3">
                                <div className="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center text-white shadow-md shadow-green-200">
                                    <IconBookOpen size={20} />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-gray-800 tracking-tight">{t.appName}</h1>
                                    <p className="text-xs text-green-600 font-medium">{t.appSub}</p>
                                </div>
                            </div>

                            <div className="px-6 mb-4">
                                <h2 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">{t.prepositionsTitle}</h2>
                                <div className="space-y-1 overflow-y-auto max-h-[60vh] pb-4 pr-1 custom-scrollbar">
                                    {prepositionsData.map((item) => {
                                        const isActive = activeId === item.id;
                                        return (
                                            <button
                                                key={item.id}
                                                onClick={() => {
                                                    setActiveId(item.id);
                                                    setIsMobileMenuOpen(false);
                                                }}
                                                className={`w-full flex items-center justify-between px-4 py-3 rounded-2xl transition-all duration-200 text-left group
                                                ${isActive 
                                                    ? 'bg-green-100/80 border border-green-400 text-green-800 shadow-sm' 
                                                    : 'border border-transparent hover:bg-[#f0f9f4] text-gray-600 hover:text-green-700'
                                                }`}
                                            >
                                                <div className="flex items-center gap-3">
                                                    <span className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold
                                                        ${isActive ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500 group-hover:bg-green-200 group-hover:text-green-700'}
                                                    `}>
                                                        {item.id}
                                                    </span>
                                                    <span className={`font-semibold ${isActive ? 'text-lg' : 'text-md'}`}>
                                                        {item.word}
                                                    </span>
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </aside>

                        {/* --- Main Content Area --- */}
                        <main className="flex-1 bg-[#fcfaf5] flex flex-col h-full overflow-y-auto w-full">
                            <div className="p-6 sm:p-10 lg:p-12 w-full max-w-4xl mx-auto flex-1 flex flex-col mt-12 md:mt-0">
                                
                                {/* Header Area */}
                                <div className="flex flex-col sm:flex-row sm:items-start justify-between border-b-2 border-green-100 pb-6 mb-8 gap-4">
                                    <div>
                                        <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm font-bold mb-3">
                                            <IconBookMarked size={16} />
                                            {t.positionPlace}
                                        </div>
                                        <h2 className="text-5xl font-extrabold text-gray-800 flex items-baseline gap-4">
                                            {activeData.word}
                                            <span className="text-2xl font-normal text-gray-400 font-serif">{activeData.phonetic}</span>
                                        </h2>
                                        <p className="text-xl text-green-600 font-medium mt-2">{t.means} {activeData.translation[language]}</p>
                                    </div>

                                    <button
                                        onClick={toggleLanguage}
                                        className="flex items-center gap-2 px-4 py-2 bg-white border-2 border-green-200 text-green-700 rounded-full font-bold hover:bg-green-50 hover:border-green-300 transition-all shadow-sm"
                                    >
                                        <IconGlobe size={18} />
                                        {t.langToggle}
                                    </button>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                    
                                    {/* Left Column - Illustration */}
                                    <div className="lg:col-span-5 flex flex-col items-center justify-center bg-white rounded-3xl p-8 border-2 border-[#e8f5e9] shadow-sm relative overflow-hidden group">
                                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-[#fdfbf7] rounded-full z-0 transition-transform duration-500 group-hover:scale-110"></div>
                                        
                                        <div className="w-48 h-48 relative z-10 transition-transform duration-300 hover:scale-105">
                                            <IllustrationComponent />
                                        </div>
                                        
                                        <div className="mt-6 z-10 w-full text-center">
                                            <span className="inline-block px-4 py-1.5 bg-orange-100 text-orange-700 rounded-full text-sm font-medium">
                                                The cat is <strong className="text-orange-800">{activeData.word.toLowerCase()}</strong> the box.
                                            </span>
                                        </div>
                                    </div>

                                    {/* Right Column - Content */}
                                    <div className="lg:col-span-7 flex flex-col gap-6">
                                        <div className="bg-white rounded-3xl p-6 border-2 border-green-50 shadow-sm relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-2 h-full bg-green-400"></div>
                                            <h3 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
                                                <IconInfo size={20} className="text-green-500" />
                                                {t.description}
                                            </h3>
                                            <p className="text-gray-600 leading-relaxed mb-4">
                                                {activeData.description[language]}
                                            </p>
                                            
                                            <div className="bg-[#fdf8f0] p-4 rounded-xl border border-orange-100">
                                                <h4 className="text-sm font-bold text-orange-800 mb-1 flex items-center gap-2">
                                                    {t.trick}
                                                </h4>
                                                <p className="text-orange-700 text-sm">{activeData.keyRule[language]}</p>
                                            </div>
                                        </div>

                                        <div className="bg-white rounded-3xl p-6 border-2 border-green-50 shadow-sm">
                                            <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                                <IconCheckCircle size={20} className="text-green-500" />
                                                {t.examples}
                                            </h3>
                                            <div className="space-y-4">
                                                {activeData.examples.map((ex, idx) => (
                                                    <div key={idx} className="flex gap-4 items-start bg-[#fcfaf5] p-4 rounded-2xl border border-gray-100 hover:border-green-200 transition-colors">
                                                        <div className="w-8 h-8 rounded-full bg-green-100 text-green-700 flex items-center justify-center font-bold text-sm shrink-0">
                                                            {idx + 1}
                                                        </div>
                                                        <div>
                                                            <p className="font-semibold text-gray-800 text-lg mb-1">{ex.en}</p>
                                                            {language === 'th' && <p className="text-gray-500 text-sm">{ex.th}</p>}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Footer / References */}
                                <div className="mt-12 pt-6 border-t border-gray-200 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <p className="text-xs text-gray-400">
                                        {t.footerText}
                                    </p>
                                    <div className="flex items-center gap-2 text-xs text-gray-400 bg-white px-3 py-1.5 rounded-full border border-gray-100 shadow-sm">
                                        <IconExternalLink size={14} className="text-green-500"/>
                                        {t.refText}
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        // --- ทำการ Render React ลงไปใน <div> ที่มี id="root" ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
